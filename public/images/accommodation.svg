<svg xmlns="http://www.w3.org/2000/svg" width="800" height="500" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0f0f"/>
      <stop offset="100%" style="stop-color:#1a1a2e"/>
    </linearGradient>
  </defs>
  <rect width="800" height="500" fill="url(#bg2)"/>
  <!-- House shapes -->
  <polygon points="200,220 280,150 360,220" fill="none" stroke="#60a5fa55" stroke-width="2"/>
  <rect x="215" y="220" width="130" height="90" rx="2" fill="#ffffff08" stroke="#60a5fa33" stroke-width="1"/>
  <!-- Door -->
  <rect x="265" y="265" width="30" height="45" rx="2" fill="#60a5fa33"/>
  <!-- Window -->
  <rect x="225" y="235" width="30" height="25" rx="2" fill="#4ade8033"/>
  <rect x="295" y="235" width="30" height="25" rx="2" fill="#4ade8033"/>
  <!-- Second house -->
  <polygon points="390,230 460,168 530,230" fill="none" stroke="#60a5fa44" stroke-width="2"/>
  <rect x="403" y="230" width="114" height="80" rx="2" fill="#ffffff06" stroke="#60a5fa2a" stroke-width="1"/>
  <rect x="450" y="268" width="26" height="42" rx="2" fill="#60a5fa2a"/>
  <!-- Third house smaller -->
  <polygon points="560,240 615,192 670,240" fill="none" stroke="#60a5fa33" stroke-width="2"/>
  <rect x="571" y="240" width="88" height="70" rx="2" fill="#ffffff05" stroke="#60a5fa22" stroke-width="1"/>
  <!-- Cloud / AWS icon suggestion -->
  <ellipse cx="620" cy="110" rx="55" ry="25" fill="#ffffff08" stroke="#f59e0b44" stroke-width="1"/>
  <ellipse cx="590" cy="118" rx="30" ry="20" fill="#ffffff08"/>
  <ellipse cx="650" cy="118" rx="28" ry="18" fill="#ffffff08"/>
  <text x="620" y="115" font-family="monospace" font-size="10" fill="#f59e0b88" text-anchor="middle">AWS</text>
  <!-- Docker icon suggestion -->
  <rect x="130" y="100" width="60" height="45" rx="4" fill="#ffffff06" stroke="#60a5fa44" stroke-width="1"/>
  <text x="160" y="128" font-family="monospace" font-size="10" fill="#60a5fa88" text-anchor="middle">Docker</text>
  <!-- JWT badge -->
  <rect x="130" y="158" width="60" height="22" rx="4" fill="#4ade8022" stroke="#4ade8044" stroke-width="1"/>
  <text x="160" y="173" font-family="monospace" font-size="9" fill="#4ade8099" text-anchor="middle">JWT Auth</text>
  <!-- Label -->
  <text x="400" y="460" font-family="monospace" font-size="18" fill="#ffffff60" text-anchor="middle">Student Accommodation Finder</text>
  <text x="400" y="482" font-family="monospace" font-size="12" fill="#ffffff35" text-anchor="middle">Spring Boot · React · PostgreSQL · AWS · Docker</text>
